# Global toggles shared by every backend. They mirror fields in GenerationSettings.
device: auto                    # auto | cuda | cpu | mps
enable_xformers: true           # allow xFormers attention optimisation when available
enable_attention_slicing: false # slice attention layers to reduce VRAM usage
enable_sequential_cpu_offload: false # offload entire model sequentially to CPU
enable_model_cpu_offload: false      # enable model CPU offload (mutually exclusive with sequential)
enable_compile: false           # opt-in to torch.compile when supported
autocast_precision: fp16        # autocast precision for inference (fp16/bf16/fp32)
safety_mode: warn               # warn | block | off — affects NSFW handling

models:
  # Stable Diffusion 1.5 backend with dedicated img2img, inpaint and x4 upscaler.
  sd15:
    text2img:
      id: runwayml/stable-diffusion-v1-5
      torch_dtype: float16
      scheduler: dpmpp_2m_karras
    img2img:
      id: runwayml/stable-diffusion-v1-5
      torch_dtype: float16
    inpaint:
      id: runwayml/stable-diffusion-inpainting
      torch_dtype: float16
    upscale:
      id: stabilityai/sd-x4-upscaler
      torch_dtype: float16
    default_width: 512
    default_height: 512
    default_steps: 25
    default_cfg_scale: 7.5
    default_scheduler: dpmpp_2m_karras

  # Stable Diffusion XL backend. Includes the base model, refiner and inpainting variant.
  sdxl:
    text2img:
      id: stabilityai/stable-diffusion-xl-base-1.0
      torch_dtype: float16
      variant: fp16
      scheduler: dpmpp_2m_karras
    img2img:
      id: stabilityai/stable-diffusion-xl-base-1.0
      torch_dtype: float16
      variant: fp16
    inpaint:
      id: diffusers/stable-diffusion-xl-1.0-inpainting-0.1
      torch_dtype: float16
      variant: fp16
    refiner:
      id: stabilityai/stable-diffusion-xl-refiner-1.0
      torch_dtype: float16
      variant: fp16
    default_width: 768
    default_height: 768
    default_steps: 30
    default_cfg_scale: 7.0
    default_scheduler: dpmpp_2m_karras
