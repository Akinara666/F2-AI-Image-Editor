name: CD Validation

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-config-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate staging deploy config
        run: docker compose -f deploy/compose.staging.yaml config >/dev/null

      - name: Validate production deploy config
        run: docker compose -f deploy/compose.prod.yaml config >/dev/null

  staging-validation:
    needs: release-config-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend validation image
        run: |
          docker build \
            -f backend/Dockerfile \
            --build-arg INSTALL_AI_RUNTIME=false \
            --build-arg INSTALL_OPTIONAL_RUNTIME=false \
            -t ghcr.io/akinara666/working-title-psd2-backend:staging-validation-${{ github.sha }} \
            backend

      - name: Build frontend validation image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg VITE_API_BASE_URL= \
            -t ghcr.io/akinara666/working-title-psd2-frontend:staging-validation-${{ github.sha }} \
            frontend

      - name: Start staging validation stack
        run: |
          export BACKEND_ENV_FILE=./backend.env.example
          export BACKEND_IMAGE_TAG=staging-validation-${{ github.sha }}
          export FRONTEND_IMAGE_TAG=staging-validation-${{ github.sha }}
          docker compose -f deploy/compose.staging.yaml up -d

      - name: Verify staging validation health
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/health >/dev/null \
              && curl --fail --silent http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Staging validation health check failed." >&2
          docker compose -f deploy/compose.staging.yaml ps
          docker compose -f deploy/compose.staging.yaml logs backend frontend || true
          exit 1

      - name: Verify frontend reverse-proxies the backend API
        run: |
          curl --fail --silent http://127.0.0.1:3000/health >/dev/null
          curl --fail --silent http://127.0.0.1:3000/models >/dev/null

      - name: Stop staging validation stack
        if: always()
        run: |
          export BACKEND_ENV_FILE=./backend.env.example
          export BACKEND_IMAGE_TAG=staging-validation-${{ github.sha }}
          export FRONTEND_IMAGE_TAG=staging-validation-${{ github.sha }}
          docker compose -f deploy/compose.staging.yaml down --volumes --remove-orphans
