name: Backend CD Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch name to deploy to production
        required: false
        default: main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend production image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          build-args: |
            INSTALL_AI_RUNTIME=true
            INSTALL_OPTIONAL_RUNTIME=false
          tags: |
            ghcr.io/akinara666/working-title-psd2-backend:prod-${{ github.sha }}
            ghcr.io/akinara666/working-title-psd2-backend:prod-latest

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BACKEND_PROD_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.BACKEND_PROD_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Deploy backend to production server
        run: |
          ssh -p "${{ secrets.BACKEND_PROD_SSH_PORT }}" "${{ secrets.BACKEND_PROD_SSH_USER }}@${{ secrets.BACKEND_PROD_SSH_HOST }}" <<'EOF'
          set -euo pipefail
          cd "${{ secrets.BACKEND_PROD_APP_DIR }}"
          git fetch origin "${{ inputs.ref }}"
          git checkout "${{ inputs.ref }}"
          git pull --ff-only origin "${{ inputs.ref }}"
          cat > deploy/backend/backend.prod.env <<'ENVFILE'
          ${{ secrets.BACKEND_PROD_ENV_FILE }}
          ENVFILE
          echo "${{ secrets.BACKEND_PROD_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.BACKEND_PROD_GHCR_USERNAME }}" --password-stdin
          docker compose --project-directory . -f deploy/backend/compose.prod.yaml pull
          docker compose --project-directory . -f deploy/backend/compose.prod.yaml up -d
          python3 - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8000/health"
          for _ in range(20):
              try:
                  with urllib.request.urlopen(url, timeout=5) as response:
                      print(response.read().decode())
                  break
              except Exception:
                  time.sleep(3)
          else:
              raise SystemExit("Backend production health check failed.")
          PY
          EOF
