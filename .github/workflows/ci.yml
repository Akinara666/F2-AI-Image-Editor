name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  backend-unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install backend CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt

      - name: Run backend unit tests
        run: PYTHONPATH=backend python -m unittest backend.tests.test_qa_unit -v

  backend-prompt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install backend CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt

      - name: Run backend prompt tests
        run: |
          PYTHONPATH=backend python -m unittest \
            backend.tests.test_prompt_transformer \
            backend.tests.test_negative_prompt_transformer \
            -v

  backend-api-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install backend CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt

      - name: Run backend core API tests
        run: |
          PYTHONPATH=backend python -m unittest \
            backend.tests.test_qa_functional \
            backend.tests.test_qa_integration \
            -v

  backend-api-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install backend CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt

      - name: Run backend tool API tests
        run: |
          PYTHONPATH=backend python -m unittest \
            backend.tests.test_tool_endpoints \
            backend.tests.test_qa_negative \
            -v

  backend-docker-smoke:
    needs:
      - backend-unit
      - backend-prompt
      - backend-api-core
      - backend-api-tools
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend smoke image
        run: |
          docker build \
            -f backend/Dockerfile \
            --build-arg INSTALL_AI_RUNTIME=false \
            --build-arg INSTALL_OPTIONAL_RUNTIME=false \
            -t working-title-psd2-backend-ci:${{ github.sha }} \
            backend

      - name: Start backend smoke container
        run: |
          docker run -d \
            --name backend-ci-smoke \
            -p 8000:8000 \
            working-title-psd2-backend-ci:${{ github.sha }}

      - name: Verify backend health endpoint
        run: |
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health check failed." >&2
          docker logs backend-ci-smoke || true
          exit 1

      - name: Stop backend smoke container
        if: always()
        run: |
          docker rm -f backend-ci-smoke >/dev/null 2>&1 || true

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend test suite
        run: npm test
        working-directory: frontend

  frontend-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend lint
        run: npm run lint
        working-directory: frontend

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  frontend-docker-smoke:
    needs:
      - frontend-tests
      - frontend-lint
      - frontend-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend smoke image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg VITE_API_BASE_URL=http://127.0.0.1:8000 \
            -t working-title-psd2-frontend-ci:${{ github.sha }} \
            frontend

      - name: Start frontend smoke container
        run: |
          docker run -d \
            --name frontend-ci-smoke \
            -p 3000:80 \
            working-title-psd2-frontend-ci:${{ github.sha }}

      - name: Verify frontend root page
        run: |
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend smoke check failed." >&2
          docker logs frontend-ci-smoke || true
          exit 1

      - name: Stop frontend smoke container
        if: always()
        run: |
          docker rm -f frontend-ci-smoke >/dev/null 2>&1 || true
