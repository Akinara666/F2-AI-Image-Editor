name: working-title-psd2-backend-staging

services:
  backend:
    image: ghcr.io/akinara666/working-title-psd2-backend:dev-latest
    container_name: working-title-psd2-backend-staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./deploy/backend/backend.staging.env
    volumes:
      - ./backend/models:/app/models
      - ./backend/static/outputs:/app/static/outputs
    # Раскомментируй на GPU-хостах, где настроен NVIDIA Container Toolkit.
    # gpus: all
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
