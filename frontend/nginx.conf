server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Загрузка init_image / mask_image при генерации может быть тяжёлой.
    client_max_body_size 100m;

    # Docker embedded DNS — резолвим backend в рантайме, чтобы переживать его рестарты.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Единый публичный URL: nginx отдаёт SPA и проксирует API на backend (same-origin).
    # Набор backend-префиксов фиксирован (см. backend/main.py).
    location ~ ^/(generate|models|health|prompt|cancel|history|tools|quick-select|spot-heal|upscale|outputs|docs|openapi\.json) {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Live-preview polling и отдача крупных файлов из /outputs.
        proxy_buffering off;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # SPA: всё остальное отдаём из статической сборки.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
