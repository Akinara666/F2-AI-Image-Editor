<p class="text-gray-500 mb-4">or</p>
                            <div class="flex justify-center space-x-4">

                            </div>
</div>
                            </div>

<h2 class="text-lg font-semibold mb-4 flex items-center">

</div>
                                <div class="flex-1">

                                    <p class="text-xs text-gray-400">2 hours ago</p>
                                </div>
                            </div>
                            <div class="generation-card bg-white border border-gray-200 rounded-lg p-3 flex space-x-3 transition cursor-pointer hover:bg-gray-50">
                                <div class="w-16 h-16 rounded bg-gray-100 flex items-center justify-center">
                                    <i data-feather="image" class="text-gray-500"></i>
</div>
                                <div class="flex-1">

                                </div>

                                <div class="w-16 h-16 rounded bg-gray-100 flex items-center justify-center">

</div>

                                </div>

                        </div>
                    </div>
</div>
            </div>
        </main>
        <!-- Footer -->
        <footer class="bg-white border-t border-gray-200 mx-4 mb-4 p-4 text-center text-sm text-gray-500">
            <p>© 2025 WorkingTitle</p>
</footer>
    </div>
    <script>
        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
            
            // Check for saved theme preference or use system preference
            const currentTheme = localStorage.getItem('theme') || (prefersDarkScheme.matches ? 'dark' : 'light');
            if (currentTheme === 'dark') {
                document.documentElement.classList.add('dark');
            }
            
            // Set initial icon
            updateThemeIcon();
            
            themeToggle.addEventListener('click', function() {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
                updateThemeIcon();
            });
            
            function updateThemeIcon() {
                const isDark = document.documentElement.classList.contains('dark');
                themeToggle.innerHTML = feather.icons[isDark ? 'sun' : 'moon'].toSvg();
                
                // Force dark mode styles to apply
                if (isDark) {
                    document.querySelectorAll('.glass-card').forEach(el => {
                        el.classList.add('dark:bg-gray-800');
                    });
                    document.querySelectorAll('.canvas-wrapper').forEach(el => {
                        el.classList.add('dark:border-gray-700');
                    });
                }
            }
// Initialize Feather Icons
            feather.replace();
            // Simple canvas initialization
            const canvas = document.getElementById('artCanvas');
const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            // Demo: Draw something on canvas click
            canvas.addEventListener('click', function(e) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                ctx.fillStyle = `hsl(${Math.random() * 360}, 70%, 60%)`;
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fill();
                
                // Hide empty state
                document.getElementById('emptyState').style.display = 'none';
            });
        });
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.8) !important;
        }
        .dark .canvas-wrapper {
            border-color: rgba(255, 255, 255, 0.1) !important;
        }
        .dark .tool-btn:hover {
            background: rgba(255, 255, 255, 0.05) !important;

        .dark .generation-card {

        }
        .dark .generation-card:hover {

        .dark {

</style>
